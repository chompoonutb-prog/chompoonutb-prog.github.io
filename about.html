      <h1>ประวัติส่วนตัว</h1>
      <p>
        ชื่อ  นางสาวชมพูนุท บุญรอต<br>
        ชื่อเล่น  พู<br>
        วุฒิการศึกษา ปริญญาโท<br>
        สาขาวิชา    วิทยาศาสตรมหาบัณฑิต<br>
        มหาวิทยาลัย  สถาบันเทคโนโลยีพระจอมเกล้าเจ้าคุณทหารลาดกระบัง<br>
